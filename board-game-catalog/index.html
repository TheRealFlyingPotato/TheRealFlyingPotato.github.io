<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Games</title>

    <!-- Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Sticky filter bar -->
    <div id="filterBar">
        <div class="filter-group filter-group--name">
            <label for="nameFilter">Name</label>
            <input type="text" class="filter-input" id="nameFilter" placeholder="Search...">
        </div>
        <div class="filter-group filter-group--genre">
            <label for="genreFilter">Genre</label>
            <input type="text" class="filter-input" id="genreFilter" placeholder="">
        </div>
        <div class="filter-group filter-group--players">
            <label>Players</label>
            <div id="playerDropdownWrap">
                <button class="filter-input filter-dropdown-btn" id="playerDropdownBtn" type="button">
                    <span id="playerDropdownLabel">Any</span>
                    <span class="dropdown-arrow">&#9660;</span>
                </button>
                <div class="player-dropdown-menu" id="playerDropdownMenu">
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="1"> 1</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="2"> 2</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="3"> 3</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="4"> 4</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="5"> 5</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="6"> 6</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="7"> 7</label>
                    <label class="player-option"><input type="checkbox" class="player-count-check" value="8+"> 8+</label>
                </div>
            </div>
        </div>
        <div class="filter-group filter-group--weight">
            <label>Weight</label>
            <div class="weight-circles">
                <button class="weight-btn active" data-weight="any" type="button">Any</button>
                <button class="weight-btn" data-weight="1" type="button">1</button>
                <button class="weight-btn" data-weight="2" type="button">2</button>
                <button class="weight-btn" data-weight="3" type="button">3</button>
                <button class="weight-btn" data-weight="4" type="button">4</button>
                <button class="weight-btn" data-weight="5" type="button">5</button>
            </div>
        </div>
    </div>

    <!-- Hidden: kept for ?ids= URL parameter functionality -->
    <input type="hidden" id="idFilter">

    <!-- Hidden category filter (functionality preserved) -->
    <div id="categoryFilterSection" style="display:none;">
        <div id="categoryFilter"></div>
    </div>

    <!-- Game tile grid -->
    <div class="games-grid"></div>

    <!-- jQuery 3.7.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous"></script>

    <!-- Bootstrap 5.3.2 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <!-- Custom JavaScript -->
    <script src="index.js"></script>
</body>
</html>
