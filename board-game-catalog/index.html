<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Board Games</title>

    <!-- Bootstrap 5.3.2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <!-- Filter toggle button (always visible, fixed) -->
    <button id="filterToggle" title="Open filters">&#8250;</button>

    <!-- Floating filter panel -->
    <div id="filterPanel">
        <button id="filterClose" title="Close filters">&#8249;</button>
        <div class="filter-fields">
            <div class="mb-3">
                <label for="nameFilter" class="form-label">Name</label>
                <input type="text" class="form-control form-control-sm" id="nameFilter" placeholder="Search by name...">
            </div>
            <div class="mb-3">
                <label for="playerCountFilter" class="form-label">Player Count</label>
                <input type="text" class="form-control form-control-sm" id="playerCountFilter" placeholder="e.g. 2-4, 3, 4+">
            </div>
            <div class="mb-3">
                <label for="genreFilter" class="form-label">Genre</label>
                <input type="text" class="form-control form-control-sm" id="genreFilter" placeholder="">
            </div>
            <div class="mb-3">
                <label for="weightFilter" class="form-label">Weight</label>
                <input type="text" class="form-control form-control-sm" id="weightFilter" placeholder="1-5">
            </div>
            <div class="mb-3">
                <label for="idFilter" class="form-label">ID</label>
                <input type="text" class="form-control form-control-sm" id="idFilter" placeholder="1,3,5">
            </div>
        </div>
    </div>

    <!-- Game tile grid -->
    <div class="games-grid"></div>

    <!-- jQuery 3.7.1 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js" integrity="sha512-v2CJ7UaYy4JwqLDIrZUI/4hqeoQieOmAZNXBeQyjo21dadnwR+8ZaIJVT8EE2iyI61OV8e6M8PP2/4hpQINQ/g==" crossorigin="anonymous"></script>

    <!-- Bootstrap 5.3.2 JavaScript Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>

    <!-- Custom JavaScript -->
    <script src="index.js"></script>
</body>
</html>
